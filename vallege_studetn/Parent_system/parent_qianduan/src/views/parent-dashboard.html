<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>家长仪表盘 - 乡村助学平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f0f8ff;
            color: #333;
        }
        
        .container {
            display: flex;
            min-height: 100vh;
        }
        
        .sidebar {
            width: 250px;
            background: linear-gradient(135deg, #FF9800, #F57C00);
            color: white;
            padding: 20px;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
        }
        
        .sidebar h2 {
            margin-bottom: 30px;
            text-align: center;
            font-size: 1.5em;
        }
        
        .nav-menu {
            list-style: none;
        }
        
        .nav-menu li {
            margin-bottom: 10px;
        }
        
        .nav-menu a {
            display: block;
            padding: 12px;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        
        .nav-menu a:hover {
            background-color: rgba(255,255,255,0.2);
            transform: translateX(5px);
        }
        
        .nav-menu a.active {
            background-color: rgba(255,255,255,0.3);
            font-weight: bold;
        }
        
        .main-content {
            flex: 1;
            padding: 20px;
        }
        
        .header {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header h1 {
            color: #FF9800;
            font-size: 1.8em;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #FF9800;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }
        
        .dashboard-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
        }
        
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }
        
        .card h3 {
            color: #FF9800;
            margin-bottom: 15px;
            font-size: 1.3em;
        }
        
        .card-icon {
            font-size: 2.5em;
            margin-bottom: 15px;
            color: #FF9800;
        }
        
        .child-list {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        
        .child-list h3 {
            color: #FF9800;
            margin-bottom: 20px;
            font-size: 1.3em;
        }
        
        .child-item {
            display: flex;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid #e0e0e0;
            transition: all 0.3s ease;
        }
        
        .child-item:hover {
            background-color: #f9f9f9;
        }
        
        .child-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #FFF3E0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #FF9800;
            font-weight: bold;
            margin-right: 15px;
        }
        
        .child-info {
            flex: 1;
        }
        
        .child-name {
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .child-grade {
            font-size: 0.9em;
            color: #666;
        }
        
        .child-status {
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 0.8em;
            font-weight: bold;
        }
        
        .status-good {
            background-color: #d4edda;
            color: #155724;
        }
        
        .status-warning {
            background-color: #fff3cd;
            color: #856404;
        }
        
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 5px;
            font-size: 0.9em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-left: 10px;
        }
        
        .btn-primary {
            background: #FF9800;
            color: white;
        }
        
        .btn-primary:hover {
            background: #F57C00;
            transform: translateY(-2px);
        }
        
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }
            
            .sidebar {
                width: 100%;
                padding: 10px;
            }
            
            .nav-menu {
                display: flex;
                overflow-x: auto;
                gap: 10px;
            }
            
            .nav-menu li {
                margin-bottom: 0;
            }
            
            .dashboard-cards {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h2>家长中心</h2>
            <ul class="nav-menu">
                <li><a href="parent-dashboard.html" class="active">仪表盘</a></li>
                <li><a href="parent-child-management.html">孩子管理</a></li>
                <li><a href="parent-teacher-communication.html">教师沟通</a></li>
                <li><a href="parent-learning-report.html">学习报告</a></li>
                <li><a href="parent-psychological-status.html">心理状态</a></li>
                <li><a href="parent-match-confirmation.html">匹配确认</a></li>
                <li><a href="login.html">退出登录</a></li>
            </ul>
        </div>
        
        <div class="main-content">
            <div class="header">
                <h1>家长仪表盘</h1>
                <div class="user-info">
                    <span>欢迎，王家长</span>
                    <div class="user-avatar">王</div>
                </div>
            </div>
            
            <div class="dashboard-cards">
                <div class="card">
                    <div class="card-icon">👨‍🎓</div>
                    <h3>孩子情况</h3>
                    <p>当前管理 2 个孩子</p>
                    <p>1 个孩子正在接受辅导</p>
                </div>
                
                <div class="card">
                    <div class="card-icon">📊</div>
                    <h3>学习成绩</h3>
                    <p>平均成绩：85 分</p>
                    <p>最近进步：+5 分</p>
                </div>
                
                <div class="card">
                    <div class="card-icon">❤️</div>
                    <h3>心理状态</h3>
                    <p>最近评估：良好</p>
                    <p>需要关注：0 个孩子</p>
                </div>
            </div>
            
            <div class="child-list">
                <h3>我的孩子</h3>
                <div class="child-item">
                    <div class="child-avatar">小</div>
                    <div class="child-info">
                        <div class="child-name">小明</div>
                        <div class="child-grade">三年级</div>
                    </div>
                    <span class="child-status status-good">学习良好</span>
                    <button class="btn btn-primary">查看详情</button>
                </div>
                <div class="child-item">
                    <div class="child-avatar">小</div>
                    <div class="child-info">
                        <div class="child-name">小红</div>
                        <div class="child-grade">四年级</div>
                    </div>
                    <span class="child-status status-warning">需要关注</span>
                    <button class="btn btn-primary">查看详情</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
