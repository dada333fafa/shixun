<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>忘记密码 - 乡村助学平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f0f8ff;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        .container {
            max-width: 500px;
            width: 100%;
            padding: 20px;
        }
        
        .forgot-password-card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            text-align: center;
        }
        
        h1 {
            color: #4CAF50;
            margin-bottom: 30px;
            font-size: 2em;
        }
        
        .logo {
            font-size: 4em;
            margin-bottom: 20px;
            color: #4CAF50;
        }
        
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }
        
        input[type="email"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: all 0.3s ease;
        }
        
        input[type="email"]:focus {
            outline: none;
            border-color: #4CAF50;
            box-shadow: 0 0 0 3px rgba(76, 175, 80, 0.1);
        }
        
        .btn-reset {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #4CAF50, #45a049);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }
        
        .btn-reset:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(76, 175, 80, 0.3);
        }
        
        .links {
            margin-top: 20px;
            font-size: 0.9em;
        }
        
        .links a {
            color: #4CAF50;
            text-decoration: none;
            margin: 0 10px;
        }
        
        .links a:hover {
            text-decoration: underline;
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }
            
            .forgot-password-card {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="forgot-password-card">
            <div class="logo">🔒</div>
            <h1>忘记密码</h1>
            <p>请输入您的邮箱，我们将发送重置密码的链接</p>
            
            <form>
                <div class="form-group">
                    <label for="email">邮箱</label>
                    <input type="email" id="email" placeholder="请输入您的邮箱">
                </div>
                
                <button type="button" class="btn-reset" onclick="resetPassword()">发送重置链接</button>
                
                <div class="links">
                    <a href="login.html">返回登录</a>
                    <a href="index.html">返回首页</a>
                </div>
            </form>
        </div>
    </div>
    
    <script>
        function resetPassword() {
            const email = document.getElementById('email').value;
            
            if (!email) {
                alert('请输入邮箱');
                return;
            }
            
            // 发送重置链接，跳转到登录页面
            alert('重置链接已发送到您的邮箱，请查收');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
