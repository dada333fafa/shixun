<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心理状态 - 乡村助学平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f0f8ff;
            color: #333;
        }
        
        .container {
            display: flex;
            min-height: 100vh;
        }
        
        .sidebar {
            width: 250px;
            background: linear-gradient(135deg, #FF9800, #F57C00);
            color: white;
            padding: 20px;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
        }
        
        .sidebar h2 {
            margin-bottom: 30px;
            text-align: center;
            font-size: 1.5em;
        }
        
        .nav-menu {
            list-style: none;
        }
        
        .nav-menu li {
            margin-bottom: 10px;
        }
        
        .nav-menu a {
            display: block;
            padding: 12px;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        
        .nav-menu a:hover {
            background-color: rgba(255,255,255,0.2);
            transform: translateX(5px);
        }
        
        .nav-menu a.active {
            background-color: rgba(255,255,255,0.3);
            font-weight: bold;
        }
        
        .main-content {
            flex: 1;
            padding: 20px;
        }
        
        .header {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header h1 {
            color: #FF9800;
            font-size: 1.8em;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #FF9800;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }
        
        .child-selector {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }
        
        .child-selector h2 {
            color: #FF9800;
            margin-bottom: 20px;
            font-size: 1.5em;
        }
        
        .child-options {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        
        .child-option {
            padding: 15px 30px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .child-option:hover {
            border-color: #FF9800;
            background-color: #FFF3E0;
        }
        
        .child-option.active {
            border-color: #FF9800;
            background-color: #FFF3E0;
            font-weight: bold;
        }
        
        .psych-status {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 30px;
        }
        
        .psych-status h2 {
            color: #FF9800;
            margin-bottom: 20px;
            font-size: 1.5em;
        }
        
        .status-overview {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .status-card {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        
        .status-card h3 {
            margin-bottom: 10px;
            color: #555;
        }
        
        .status-value {
            font-size: 2em;
            font-weight: bold;
            color: #FF9800;
        }
        
        .status-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 15px;
            font-size: 14px;
            font-weight: bold;
            margin-top: 10px;
        }
        
        .status-good {
            background: #d4edda;
            color: #155724;
        }
        
        .status-warning {
            background: #fff3cd;
            color: #856404;
        }
        
        .status-danger {
            background: #f8d7da;
            color: #721c24;
        }
        
        .assessment-section {
            margin-bottom: 30px;
        }
        
        .assessment-section h3 {
            margin-bottom: 15px;
            color: #333;
        }
        
        .assessment-item {
            margin-bottom: 20px;
        }
        
        .assessment-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        
        .assessment-header span {
            font-weight: bold;
        }
        
        .assessment-bar {
            width: 100%;
            height: 10px;
            background: #e0e0e0;
            border-radius: 5px;
            overflow: hidden;
        }
        
        .assessment-fill {
            height: 100%;
            border-radius: 5px;
        }
        
        .fill-good {
            background: #28a745;
        }
        
        .fill-warning {
            background: #ffc107;
        }
        
        .fill-danger {
            background: #dc3545;
        }
        
        .counselor-info {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 10px;
        }
        
        .counselor-info h3 {
            margin-bottom: 15px;
            color: #333;
        }
        
        .counselor-item {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }
        
        .counselor-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #FFF3E0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #FF9800;
            font-weight: bold;
            font-size: 1.5em;
        }
        
        .counselor-details h4 {
            margin-bottom: 5px;
        }
        
        .counselor-details p {
            color: #666;
            font-size: 0.9em;
        }
        
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-primary {
            background: #FF9800;
            color: white;
        }
        
        .btn-primary:hover {
            background: #F57C00;
        }
        
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }
            
            .sidebar {
                width: 100%;
                padding: 10px;
            }
            
            .nav-menu {
                display: flex;
                overflow-x: auto;
                gap: 10px;
            }
            
            .nav-menu li {
                margin-bottom: 0;
            }
            
            .status-overview {
                grid-template-columns: 1fr;
            }
            
            .counselor-item {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h2>家长中心</h2>
            <ul class="nav-menu">
                <li><a href="parent-dashboard.html">仪表盘</a></li>
                <li><a href="parent-child-management.html">孩子管理</a></li>
                <li><a href="parent-teacher-communication.html">教师沟通</a></li>
                <li><a href="parent-learning-report.html">学习报告</a></li>
                <li><a href="parent-psychological-status.html" class="active">心理状态</a></li>
                <li><a href="parent-match-confirmation.html">匹配确认</a></li>
                <li><a href="login.html">退出登录</a></li>
            </ul>
        </div>
        
        <div class="main-content">
            <div class="header">
                <h1>心理状态</h1>
                <div class="user-info">
                    <span>欢迎，王家长</span>
                    <div class="user-avatar">王</div>
                </div>
            </div>
            
            <div class="child-selector">
                <h2>选择孩子</h2>
                <div class="child-options">
                    <div class="child-option active">小明 (三年级)</div>
                    <div class="child-option">小红 (四年级)</div>
                </div>
            </div>
            
            <div class="psych-status">
                <h2>心理状态评估</h2>
                <div class="status-overview">
                    <div class="status-card">
                        <h3>情绪状态</h3>
                        <div class="status-value">良好</div>
                        <span class="status-badge status-good">正常</span>
                    </div>
                    <div class="status-card">
                        <h3>社交能力</h3>
                        <div class="status-value">优秀</div>
                        <span class="status-badge status-good">正常</span>
                    </div>
                    <div class="status-card">
                        <h3>学习压力</h3>
                        <div class="status-value">中等</div>
                        <span class="status-badge status-warning">注意</span>
                    </div>
                    <div class="status-card">
                        <h3>心理健康</h3>
                        <div class="status-value">良好</div>
                        <span class="status-badge status-good">正常</span>
                    </div>
                </div>
                
                <div class="assessment-section">
                    <h3>详细评估</h3>
                    <div class="assessment-item">
                        <div class="assessment-header">
                            <span>情绪稳定性</span>
                            <span>85%</span>
                        </div>
                        <div class="assessment-bar">
                            <div class="assessment-fill fill-good" style="width: 85%;"></div>
                        </div>
                    </div>
                    <div class="assessment-item">
                        <div class="assessment-header">
                            <span>社交互动</span>
                            <span>90%</span>
                        </div>
                        <div class="assessment-bar">
                            <div class="assessment-fill fill-good" style="width: 90%;"></div>
                        </div>
                    </div>
                    <div class="assessment-item">
                        <div class="assessment-header">
                            <span>学习压力</span>
                            <span>60%</span>
                        </div>
                        <div class="assessment-bar">
                            <div class="assessment-fill fill-warning" style="width: 60%;"></div>
                        </div>
                    </div>
                    <div class="assessment-item">
                        <div class="assessment-header">
                            <span>自我认知</span>
                            <span>80%</span>
                        </div>
                        <div class="assessment-bar">
                            <div class="assessment-fill fill-good" style="width: 80%;"></div>
                        </div>
                    </div>
                </div>
                
                <div class="counselor-info">
                    <h3>推荐心理辅导员</h3>
                    <div class="counselor-item">
                        <div class="counselor-avatar">王</div>
                        <div class="counselor-details">
                            <h4>王心理师</h4>
                            <p>国家二级心理咨询师 | 儿童心理专家</p>
                        </div>
                        <button class="btn btn-primary">联系</button>
                    </div>
                    <div class="counselor-item">
                        <div class="counselor-avatar">张</div>
                        <div class="counselor-details">
                            <h4>张心理师</h4>
                            <p>国家二级心理咨询师 | 青少年心理专家</p>
                        </div>
                        <button class="btn btn-primary">联系</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
