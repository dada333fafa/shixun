<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>连接测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .test-result {
            padding: 15px;
            margin: 10px 0;
            border-radius: 5px;
        }
        .success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>前后端连接测试</h1>
    
    <div>
        <button onclick="testBackendConnection()">测试后端连接</button>
        <button onclick="testAPIConnection()">测试API调用</button>
        <button onclick="clearResults()">清除结果</button>
    </div>
    
    <div id="results"></div>

    <script src="api.js"></script>
    <script>
        function addResult(message, isSuccess) {
            const resultsDiv = document.getElementById('results');
            const resultDiv = document.createElement('div');
            resultDiv.className = `test-result ${isSuccess ? 'success' : 'error'}`;
            resultDiv.textContent = message;
            resultsDiv.appendChild(resultDiv);
        }

        function clearResults() {
            document.getElementById('results').innerHTML = '';
        }

        async function testBackendConnection() {
            try {
                const response = await fetch('http://localhost:5001/');
                const data = await response.json();
                
                if (response.ok) {
                    addResult(`✅ 后端连接成功！\n消息: ${data.message}\n状态: ${data.status}`, true);
                } else {
                    addResult(`❌ 后端响应错误: ${response.status}`, false);
                }
            } catch (error) {
                addResult(`❌ 无法连接到后端: ${error.message}`, false);
            }
        }

        async function testAPIConnection() {
            try {
                // 尝试获取资源列表（不需要登录）
                const response = await fetch('http://localhost:5001/api/resources', {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });
                
                if (response.status === 401) {
                    addResult('✅ API正常工作！需要认证token才能访问资源（这是正常的）', true);
                } else if (response.ok) {
                    const data = await response.json();
                    addResult(`✅ API调用成功！获取到 ${data.length} 个资源`, true);
                } else {
                    const error = await response.json();
                    addResult(`❌ API返回错误: ${error.msg || response.statusText}`, false);
                }
            } catch (error) {
                addResult(`❌ API调用失败: ${error.message}`, false);
            }
        }

        // 页面加载时自动测试
        window.onload = function() {
            addResult('页面已加载，请点击按钮进行测试', true);
        };
    </script>
</body>
</html>
