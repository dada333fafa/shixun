<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教师选择 - 乡村助学平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f0f8ff;
            color: #333;
        }
        
        .container {
            display: flex;
            min-height: 100vh;
        }
        
        .sidebar {
            width: 250px;
            background: linear-gradient(135deg, #4CAF50, #45a049);
            color: white;
            padding: 20px;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
        }
        
        .sidebar h2 {
            margin-bottom: 30px;
            text-align: center;
            font-size: 1.5em;
        }
        
        .nav-menu {
            list-style: none;
        }
        
        .nav-menu li {
            margin-bottom: 10px;
        }
        
        .nav-menu a {
            display: block;
            padding: 12px;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        
        .nav-menu a:hover {
            background-color: rgba(255,255,255,0.2);
            transform: translateX(5px);
        }
        
        .nav-menu a.active {
            background-color: rgba(255,255,255,0.3);
            font-weight: bold;
        }
        
        .main-content {
            flex: 1;
            padding: 20px;
        }
        
        .header {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header h1 {
            color: #4CAF50;
            font-size: 1.8em;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #4CAF50;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }
        
        .search-filter {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        
        .search-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .search-bar input {
            flex: 1;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
        }
        
        .search-bar button {
            padding: 10px 20px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .search-bar button:hover {
            background: #45a049;
            transform: translateY(-2px);
        }
        
        .filters {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .filter-item {
            display: flex;
            flex-direction: column;
        }
        
        .filter-item label {
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }
        
        .filter-item select {
            padding: 8px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
        }
        
        .teacher-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }
        
        .teacher-card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
        }
        
        .teacher-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }
        
        .teacher-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }
        
        .teacher-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #E8F5E8;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #4CAF50;
            font-size: 1.5em;
            font-weight: bold;
        }
        
        .teacher-info h3 {
            color: #4CAF50;
            margin-bottom: 5px;
        }
        
        .teacher-subject {
            font-size: 0.9em;
            color: #666;
        }
        
        .teacher-details {
            margin-bottom: 15px;
        }
        
        .teacher-details p {
            margin-bottom: 5px;
            font-size: 0.9em;
        }
        
        .teacher-skills {
            margin-bottom: 15px;
        }
        
        .skill-tag {
            display: inline-block;
            padding: 5px 10px;
            background: #E8F5E8;
            color: #4CAF50;
            border-radius: 15px;
            font-size: 0.8em;
            margin-right: 5px;
            margin-bottom: 5px;
        }
        
        .btn-request {
            width: 100%;
            padding: 10px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-request:hover {
            background: #45a049;
            transform: translateY(-2px);
        }
        
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }
            
            .sidebar {
                width: 100%;
                padding: 10px;
            }
            
            .nav-menu {
                display: flex;
                overflow-x: auto;
                gap: 10px;
            }
            
            .nav-menu li {
                margin-bottom: 0;
            }
            
            .filters {
                flex-direction: column;
            }
            
            .teacher-list {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h2>学生中心</h2>
            <ul class="nav-menu">
                <li><a href="student-dashboard.html">仪表盘</a></li>
                <li><a href="student-teacher-selection.html" class="active">教师选择</a></li>
                <li><a href="student-chat.html">聊天沟通</a></li>
                <li><a href="student-resources.html">学习资源</a></li>
                <li><a href="student-psychological.html">心理支持</a></li>
                <li><a href="student-ai-recommendation.html">AI推荐</a></li>
                <li><a href="student-match.html">匹配管理</a></li>
                <li><a href="login.html">退出登录</a></li>
            </ul>
        </div>
        
        <div class="main-content">
            <div class="header">
                <h1>教师选择</h1>
                <div class="user-info">
                    <span>欢迎，小明</span>
                    <div class="user-avatar">小</div>
                </div>
            </div>
            
            <div class="search-filter">
                <div class="search-bar">
                    <input type="text" id="searchInput" placeholder="搜索教师姓名或科目" oninput="filterTeachers()">
                    <button onclick="filterTeachers()">搜索</button>
                </div>
                <div class="filters">
                    <div class="filter-item">
                        <label>科目</label>
                        <select id="subjectFilter" onchange="filterTeachers()">
                            <option value="">全部科目</option>
                            <option value="math">数学</option>
                            <option value="chinese">语文</option>
                            <option value="english">英语</option>
                            <option value="physics">物理</option>
                            <option value="chemistry">化学</option>
                            <option value="biology">生物</option>
                        </select>
                    </div>
                    <div class="filter-item">
                        <label>教学经验</label>
                        <select id="experienceFilter" onchange="filterTeachers()">
                            <option value="">全部经验</option>
                            <option value="1-3">1-3年</option>
                            <option value="3-5">3-5年</option>
                            <option value="5+">5年以上</option>
                        </select>
                    </div>
                    <div class="filter-item">
                        <label>年级</label>
                        <select id="gradeFilter" onchange="filterTeachers()">
                            <option value="">全部年级</option>
                            <option value="primary">小学</option>
                            <option value="middle">初中</option>
                            <option value="high">高中</option>
                        </select>
                    </div>
                </div>
            </div>
            
            <div class="teacher-list">
                <div class="teacher-card">
                    <div class="teacher-header">
                        <div class="teacher-avatar">李</div>
                        <div class="teacher-info">
                            <h3>李老师</h3>
                            <div class="teacher-subject">数学教师</div>
                        </div>
                    </div>
                    <div class="teacher-details">
                        <p>🎓 教育背景：北京大学数学专业</p>
                        <p>📚 教学经验：8年</p>
                        <p>📍 所在地：北京市</p>
                    </div>
                    <div class="teacher-skills">
                        <span class="skill-tag">小学数学</span>
                        <span class="skill-tag">初中数学</span>
                        <span class="skill-tag">奥数</span>
                    </div>
                    <button class="btn-request" onclick="requestTeacher(1)">发送辅导请求</button>
                </div>
                
                <div class="teacher-card">
                    <div class="teacher-header">
                        <div class="teacher-avatar">王</div>
                        <div class="teacher-info">
                            <h3>王老师</h3>
                            <div class="teacher-subject">语文教师</div>
                        </div>
                    </div>
                    <div class="teacher-details">
                        <p>🎓 教育背景：北京师范大学中文专业</p>
                        <p>📚 教学经验：5年</p>
                        <p>📍 所在地：上海市</p>
                    </div>
                    <div class="teacher-skills">
                        <span class="skill-tag">小学语文</span>
                        <span class="skill-tag">初中语文</span>
                        <span class="skill-tag">作文指导</span>
                    </div>
                    <button class="btn-request" onclick="requestTeacher(2)">发送辅导请求</button>
                </div>
                
                <div class="teacher-card">
                    <div class="teacher-header">
                        <div class="teacher-avatar">张</div>
                        <div class="teacher-info">
                            <h3>张老师</h3>
                            <div class="teacher-subject">英语教师</div>
                        </div>
                    </div>
                    <div class="teacher-details">
                        <p>🎓 教育背景：清华大学英语专业</p>
                        <p>📚 教学经验：6年</p>
                        <p>📍 所在地：广州市</p>
                    </div>
                    <div class="teacher-skills">
                        <span class="skill-tag">小学英语</span>
                        <span class="skill-tag">初中英语</span>
                        <span class="skill-tag">口语训练</span>
                    </div>
                    <button class="btn-request" onclick="requestTeacher(3)">发送辅导请求</button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="api.js"></script>
    <script>
        let allTeachers = [];
        let filteredTeachers = [];
        
        // 页面加载时获取教师列表和用户信息
        async function initPage() {
            try {
                // 获取用户信息
                const currentUser = await getCurrentUser();
                document.querySelector('.user-info span').textContent = `欢迎，${currentUser.name || currentUser.username}`;
                document.querySelector('.user-avatar').textContent = (currentUser.name || currentUser.username).charAt(0);
                
                // 获取教师列表
                await loadTeachers();
            } catch (error) {
                console.error('初始化页面失败:', error);
                alert('加载页面失败，请重新登录');
                window.location.href = 'login.html';
            }
        }
        
        // 从后端加载教师列表
        async function loadTeachers() {
            try {
                const teachers = await getTeachers();
                allTeachers = teachers;
                filteredTeachers = [...allTeachers];
                renderTeachers();
            } catch (error) {
                console.error('加载教师列表失败:', error);
                alert('加载教师列表失败: ' + error.message);
            }
        }
        
        // 渲染教师卡片
        function renderTeachers() {
            const teacherList = document.querySelector('.teacher-list');
            
            if (filteredTeachers.length === 0) {
                teacherList.innerHTML = '<div style="text-align: center; padding: 40px; color: #999; grid-column: 1 / -1;">没有找到匹配的教师</div>';
                return;
            }
            
            teacherList.innerHTML = filteredTeachers.map(teacher => {
                // 处理科目（数据库中存储的是中文字符串，可能是逗号分隔的多个科目）
                const subjectStr = teacher.detail && teacher.detail.subject ? teacher.detail.subject : '';
                const subjects = subjectStr ? subjectStr.split(/[,、]/) : [];
                const subjectNames = subjects.map(s => s.trim()).filter(s => s).join('、');
                
                const teacherName = teacher.name || teacher.username;
                const initials = teacherName.charAt(0);
                
                return `
                    <div class="teacher-card" data-teacher-id="${teacher.id}" data-teacher-name="${teacherName}" data-subject="${subjectNames}">
                        <div class="teacher-header">
                            <div class="teacher-avatar">${initials}</div>
                            <div class="teacher-info">
                                <h3>${teacherName}</h3>
                                <div class="teacher-subject">${subjectNames || '教师'}</div>
                            </div>
                        </div>
                        <div class="teacher-details">
                            <p>🎓 教育背景：${teacher.detail && teacher.detail.education ? teacher.detail.education : '暂未填写'}</p>
                            <p>📚 教学经验：${teacher.detail && teacher.detail.experience ? teacher.detail.experience : '暂未填写'}</p>
                            <p>📍 联系电话：${teacher.phone || '未提供'}</p>
                        </div>
                        ${subjectNames ? `
                        <div class="teacher-skills">
                            ${subjects.map(s => `<span class="skill-tag">${s}</span>`).join('')}
                        </div>
                        ` : ''}
                        <button class="btn-request" onclick="requestTeacher('${teacher.id}', '${teacherName}')">发送辅导请求</button>
                    </div>
                `;
            }).join('');
        }
        
        // 搜索教师
        function searchTeachers() {
            const keyword = document.getElementById('searchInput').value.toLowerCase().trim();
            filterTeachers();
        }
        
        // 筛选教师
        function filterTeachers() {
            const keyword = document.getElementById('searchInput').value.toLowerCase().trim();
            const subjectFilter = document.getElementById('subjectFilter').value;
            const experienceFilter = document.getElementById('experienceFilter').value;
            const gradeFilter = document.getElementById('gradeFilter').value;
            
            filteredTeachers = allTeachers.filter(teacher => {
                const teacherName = (teacher.name || teacher.username || '').toLowerCase();
                
                // 处理科目（数据库中是中文字符串，可能用逗号或顿号分隔）
                const subjectStr = teacher.detail && teacher.detail.subject ? teacher.detail.subject : '';
                const subjects = subjectStr ? subjectStr.split(/[,、]/) : [];
                const subjectNames = subjects.map(s => s.trim()).filter(s => s).join('');
                
                // 解析经验年数（从"5年教学经验"中提取数字5）
                const expStr = teacher.detail && teacher.detail.experience ? teacher.detail.experience : '0';
                const expMatch = expStr.match(/(\d+)/);
                const experience = expMatch ? parseInt(expMatch[1]) : 0;
                
                // 关键词搜索
                if (keyword && !teacherName.includes(keyword) && !subjectNames.includes(keyword)) {
                    return false;
                }
                
                // 科目筛选（下拉菜单的值是英文，需要映射到中文）
                if (subjectFilter) {
                    const subjectMap = {
                        'math': '数学',
                        'chinese': '语文',
                        'english': '英语',
                        'physics': '物理',
                        'chemistry': '化学',
                        'biology': '生物'
                    };
                    const chineseSubject = subjectMap[subjectFilter] || subjectFilter;
                    if (!subjectNames.includes(chineseSubject)) {
                        return false;
                    }
                }
                
                // 经验筛选
                if (experienceFilter) {
                    if (experienceFilter === '1-3' && (experience < 1 || experience > 3)) return false;
                    if (experienceFilter === '3-5' && (experience < 3 || experience > 5)) return false;
                    if (experienceFilter === '5+' && experience < 5) return false;
                }
                
                return true;
            });
            
            renderTeachers();
        }
        
        // 发送辅导请求
        async function requestTeacher(teacherId, teacherName) {
            try {
                if (!confirm(`确定要向${teacherName}发送辅导请求吗？`)) {
                    return;
                }
                
                const message = prompt('请输入辅导需求描述（可选）：') || '';
                
                const result = await sendMatchRequest(teacherId, message);
                alert(result.msg || '辅导请求已发送，请等待老师和家长确认');
                
                // 跳转到匹配管理页面
                window.location.href = 'student-match.html';
            } catch (error) {
                console.error('发送请求失败:', error);
                alert('发送请求失败: ' + error.message);
            }
        }
        
        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', initPage);
    </script>
</body>
</html>
