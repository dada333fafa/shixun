<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聊天沟通 - 乡村助学平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f0f8ff;
            color: #333;
        }
        
        .container {
            display: flex;
            min-height: 100vh;
        }
        
        .sidebar {
            width: 250px;
            background: linear-gradient(135deg, #4CAF50, #45a049);
            color: white;
            padding: 20px;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
        }
        
        .sidebar h2 {
            margin-bottom: 30px;
            text-align: center;
            font-size: 1.5em;
        }
        
        .nav-menu {
            list-style: none;
        }
        
        .nav-menu li {
            margin-bottom: 10px;
        }
        
        .nav-menu a {
            display: block;
            padding: 12px;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        
        .nav-menu a:hover {
            background-color: rgba(255,255,255,0.2);
            transform: translateX(5px);
        }
        
        .nav-menu a.active {
            background-color: rgba(255,255,255,0.3);
            font-weight: bold;
        }
        
        .main-content {
            flex: 1;
            display: flex;
        }
        
        .chat-sidebar {
            width: 300px;
            background: white;
            border-right: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
        }
        
        .chat-header {
            padding: 20px;
            border-bottom: 1px solid #e0e0e0;
            font-weight: bold;
            font-size: 1.1em;
        }
        
        .chat-list {
            flex: 1;
            overflow-y: auto;
        }
        
        .chat-item {
            padding: 15px;
            border-bottom: 1px solid #e0e0e0;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .chat-item:hover {
            background-color: #f9f9f9;
        }
        
        .chat-item.active {
            background-color: #e8f5e8;
        }
        
        .chat-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }
        
        .chat-item-name {
            font-weight: bold;
        }
        
        .chat-item-time {
            font-size: 0.8em;
            color: #666;
        }
        
        .chat-item-message {
            font-size: 0.9em;
            color: #666;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: white;
        }
        
        .chat-top-bar {
            padding: 20px;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .chat-user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #4CAF50;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }
        
        .chat-user-info h3 {
            margin-bottom: 2px;
        }
        
        .chat-user-status {
            font-size: 0.8em;
            color: #4CAF50;
        }
        
        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background-color: #f9f9f9;
        }
        
        .message {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }
        
        .message.received {
            align-items: flex-start;
        }
        
        .message.sent {
            align-items: flex-end;
        }
        
        .message-content {
            max-width: 70%;
            padding: 10px 15px;
            border-radius: 15px;
            word-wrap: break-word;
        }
        
        .message.received .message-content {
            background: white;
            border-bottom-left-radius: 5px;
        }
        
        .message.sent .message-content {
            background: #4CAF50;
            color: white;
            border-bottom-right-radius: 5px;
        }
        
        .message-time {
            font-size: 0.7em;
            color: #666;
            margin-top: 5px;
        }
        
        .chat-input-area {
            padding: 20px;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }
        
        .chat-input {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 1em;
            resize: none;
        }
        
        .chat-input:focus {
            outline: none;
            border-color: #4CAF50;
        }
        
        .chat-send-btn {
            padding: 0 20px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .chat-send-btn:hover {
            background: #45a049;
            transform: translateY(-2px);
        }
        
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }
            
            .sidebar {
                width: 100%;
                padding: 10px;
            }
            
            .nav-menu {
                display: flex;
                overflow-x: auto;
                gap: 10px;
            }
            
            .nav-menu li {
                margin-bottom: 0;
            }
            
            .main-content {
                flex-direction: column;
            }
            
            .chat-sidebar {
                width: 100%;
                height: 200px;
                border-right: none;
                border-bottom: 1px solid #e0e0e0;
            }
            
            .message-content {
                max-width: 85%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h2>学生中心</h2>
            <ul class="nav-menu">
                <li><a href="student-dashboard.html">仪表盘</a></li>
                <li><a href="student-teacher-selection.html">教师选择</a></li>
                <li><a href="student-chat.html" class="active">聊天沟通</a></li>
                <li><a href="student-resources.html">学习资源</a></li>
                <li><a href="student-psychological.html">心理支持</a></li>
                <li><a href="student-ai-recommendation.html">AI推荐</a></li>
                <li><a href="student-match.html">匹配管理</a></li>
                <li><a href="login.html">退出登录</a></li>
            </ul>
        </div>
        
        <div class="main-content">
            <div class="chat-sidebar">
                <div class="chat-header">聊天列表</div>
                <div class="chat-list">
                    <div class="chat-item active" onclick="selectChat('teacher1')">
                        <div class="chat-item-header">
                            <div class="chat-item-name">李老师</div>
                            <div class="chat-item-time">10:30</div>
                        </div>
                        <div class="chat-item-message">好的，我们明天下午3点开始辅导</div>
                    </div>
                    <div class="chat-item" onclick="selectChat('parent1')">
                        <div class="chat-item-header">
                            <div class="chat-item-name">妈妈</div>
                            <div class="chat-item-time">昨天</div>
                        </div>
                        <div class="chat-item-message">最近学习怎么样？</div>
                    </div>
                    <div class="chat-item" onclick="selectChat('teacher2')">
                        <div class="chat-item-header">
                            <div class="chat-item-name">王老师</div>
                            <div class="chat-item-time">2天前</div>
                        </div>
                        <div class="chat-item-message">作文作业已经批改好了</div>
                    </div>
                </div>
            </div>
            
            <div class="chat-container" id="chatContainer">
                <!-- 未选择聊天对象时显示的空白提示 -->
                <div id="emptyChat" style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: #999;">
                    <div style="font-size: 4em; margin-bottom: 20px;">💬</div>
                    <div style="font-size: 1.2em; margin-bottom: 10px;">请选择聊天对象</div>
                    <div style="font-size: 0.9em;">从左侧列表选择一位老师开始聊天</div>
                </div>
                
                <!-- 选择聊天对象后显示的聊天界面 -->
                <div id="chatContent" style="display: none; height: 100%; flex-direction: column;">
                    <div class="chat-top-bar">
                        <div class="chat-user-avatar" id="chatAvatar">李</div>
                        <div class="chat-user-info">
                            <h3 id="chatUserName">李老师</h3>
                            <div class="chat-user-status">在线</div>
                        </div>
                    </div>
                    
                    <div class="chat-messages" id="chatMessages">
                    </div>
                    
                    <div class="chat-input-area">
                        <input type="text" class="chat-input" id="chatInput" placeholder="输入消息...">
                        <button class="chat-send-btn" onclick="sendMessageToUser()">发送</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="api.js"></script>
    <script>
        let currentChatUserId = null; // 当前聊天的用户ID
        let currentUser = null; // 当前登录用户

        // 页面加载时初始化
        window.addEventListener('DOMContentLoaded', async function() {
            try {
                // 获取当前用户信息
                currentUser = await getCurrentUser();
                console.log('当前用户:', currentUser);
                
                // 加载对话列表
                await loadConversations();
                
                // 如果有选中的聊天，加载消息历史
                if (currentChatUserId) {
                    await loadChatMessages(currentChatUserId);
                }
            } catch (error) {
                console.error('初始化失败:', error);
                alert('请先登录');
                window.location.href = 'login.html';
            }
        });

        // 加载对话列表
        async function loadConversations() {
            try {
                // 获取历史对话
                const conversations = await getConversations();
                
                // 获取所有教师列表
                const teachers = await getTeachers();
                
                const chatList = document.querySelector('.chat-list');
                
                // 合并历史对话和教师列表
                const conversationUserIds = new Set(conversations.map(conv => conv.userId));
                
                // 将还没有对话的教师添加到列表中
                const allChats = [...conversations];
                
                teachers.forEach(teacher => {
                    if (!conversationUserIds.has(teacher.id)) {
                        allChats.push({
                            userId: teacher.id,
                            username: teacher.username,
                            name: teacher.name,
                            lastMessage: '点击开始聊天',
                            lastMessageTime: new Date().toISOString(),
                            subject: teacher.detail ? teacher.detail.subject : ''
                        });
                    }
                });
                
                // 按时间排序（有消息的在前）
                allChats.sort((a, b) => {
                    if (a.lastMessage === '点击开始聊天') return 1;
                    if (b.lastMessage === '点击开始聊天') return -1;
                    return new Date(b.lastMessageTime) - new Date(a.lastMessageTime);
                });
                
                if (allChats && allChats.length > 0) {
                    chatList.innerHTML = allChats.map((chat, index) => `
                        <div class="chat-item" data-user-id="${chat.userId}" data-user-name="${chat.name || chat.username}" onclick="selectChatFromElement(this)">
                            <div class="chat-item-header">
                                <div class="chat-item-name">${chat.name || chat.username}${chat.subject ? ` (${chat.subject})` : ''}</div>
                                <div class="chat-item-time">${formatTime(chat.lastMessageTime)}</div>
                            </div>
                            <div class="chat-item-message">${chat.lastMessage}</div>
                        </div>
                    `).join('');
                } else {
                    chatList.innerHTML = '<div style="padding: 20px; text-align: center; color: #999;">暂无聊天记录</div>';
                }
            } catch (error) {
                console.error('加载对话列表失败:', error);
            }
        }

        // 选择聊天对象（从DOM元素获取数据）
        async function selectChatFromElement(element) {
            const userId = element.getAttribute('data-user-id');
            const userName = element.getAttribute('data-user-name');
            
            // 标记当前选中的聊天项
            document.querySelectorAll('.chat-item').forEach(item => {
                item.classList.remove('active');
            });
            element.classList.add('active');
            
            await selectChat(userId, userName);
        }

        // 选择聊天对象
        async function selectChat(userId, userName) {
            currentChatUserId = userId;
            
            // 显示聊天内容，隐藏空白提示
            document.getElementById('emptyChat').style.display = 'none';
            document.getElementById('chatContent').style.display = 'flex';
            
            // 更新UI显示
            document.getElementById('chatAvatar').textContent = (userName || '用户')[0];
            document.getElementById('chatUserName').textContent = userName || '用户';
            
            // 加载该用户的消息历史
            await loadChatMessages(userId);
        }

        // 加载聊天消息
        async function loadChatMessages(userId) {
            try {
                const messages = await getMessages(userId);
                const chatMessages = document.getElementById('chatMessages');
                
                console.log('======================================');
                console.log('加载消息调试信息:');
                console.log('当前用户完整信息:', currentUser);
                console.log('当前用户ID:', currentUser.id);
                console.log('当前用户ID类型:', typeof currentUser.id);
                console.log('消息列表数量:', messages ? messages.length : 0);
                console.log('======================================');
                
                if (messages && messages.length > 0) {
                    chatMessages.innerHTML = messages.map((msg, index) => {
                        // 安全地获取发送者ID
                        let senderId = null;
                        let senderInfo = '';
                        
                        if (msg.sender) {
                            if (typeof msg.sender === 'object') {
                                // 如果是populate后的对象
                                senderId = msg.sender._id ? msg.sender._id.toString() : null;
                                senderInfo = `${msg.sender.username || ''} (${msg.sender.name || ''})`;
                            } else {
                                // 如果是ObjectId字符串
                                senderId = msg.sender.toString();
                                senderInfo = msg.sender;
                            }
                        }
                        
                        const currentUserId = currentUser.id ? currentUser.id.toString() : '';
                        const isSent = senderId === currentUserId;
                        
                        console.log(`\n消息 ${index + 1}:`);
                        console.log(`  - 发送者ID: ${senderId}`);
                        console.log(`  - 发送者信息: ${senderInfo}`);
                        console.log(`  - 当前用户ID: ${currentUserId}`);
                        console.log(`  - 比较结果: ${senderId} === ${currentUserId} = ${isSent}`);
                        console.log(`  - 消息内容: ${msg.content}`);
                        
                        const time = formatMessageTime(msg.createdAt);
                        return `
                            <div class="message ${isSent ? 'sent' : 'received'}">
                                <div class="message-content">${msg.content}</div>
                                <div class="message-time">${time}</div>
                            </div>
                        `;
                    }).join('');
                } else {
                    chatMessages.innerHTML = '<div style="text-align: center; color: #999; padding: 20px;">开始新的对话</div>';
                }
                
                // 滚动到底部
                chatMessages.scrollTop = chatMessages.scrollHeight;
            } catch (error) {
                console.error('加载消息失败:', error);
                alert('加载消息失败: ' + error.message);
            }
        }

        // 发送消息
        async function sendMessageToUser() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            
            if (!message) {
                alert('请输入消息内容');
                return;
            }
            
            if (!currentChatUserId) {
                alert('请先选择一个聊天对象');
                return;
            }
            
            try {
                // 发送到后端
                const sentMessage = await sendMessage(currentChatUserId, message);
                
                // 添加到聊天界面
                const chatMessages = document.getElementById('chatMessages');
                const time = formatMessageTime(sentMessage.createdAt);
                
                const messageElement = document.createElement('div');
                messageElement.className = 'message sent';
                messageElement.innerHTML = `
                    <div class="message-content">${sentMessage.content}</div>
                    <div class="message-time">${time}</div>
                `;
                
                chatMessages.appendChild(messageElement);
                chatMessages.scrollTop = chatMessages.scrollHeight;
                
                // 清空输入框
                input.value = '';
                
                // 重新加载对话列表以更新最新消息
                await loadConversations();
            } catch (error) {
                console.error('发送消息失败:', error);
                alert('发送消息失败: ' + error.message);
            }
        }

        // 格式化时间（用于对话列表）
        function formatTime(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            const diff = now - date;
            
            // 如果是今天，显示时分
            if (diff < 24 * 60 * 60 * 1000 && date.getDate() === now.getDate()) {
                return `${date.getHours()}:${(date.getMinutes() < 10 ? '0' : '') + date.getMinutes()}`;
            }
            // 如果是昨天
            else if (diff < 48 * 60 * 60 * 1000) {
                return '昨天';
            }
            // 否则显示日期
            else {
                return `${date.getMonth() + 1}/${date.getDate()}`;
            }
        }

        // 格式化消息时间
        function formatMessageTime(dateString) {
            const date = new Date(dateString);
            return `${date.getHours()}:${(date.getMinutes() < 10 ? '0' : '') + date.getMinutes()}`;
        }

        // 监听Enter键发送消息
        document.getElementById('chatInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendMessageToUser();
            }
        });
    </script>
</body>
</html>
