<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI配置 - 乡村助学平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f0f8ff;
            color: #333;
        }
        
        .container {
            display: flex;
            min-height: 100vh;
        }
        
        .sidebar {
            width: 250px;
            background: linear-gradient(135deg, #9C27B0, #7B1FA2);
            color: white;
            padding: 20px;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
        }
        
        .sidebar h2 {
            margin-bottom: 30px;
            text-align: center;
            font-size: 1.5em;
        }
        
        .nav-menu {
            list-style: none;
        }
        
        .nav-menu li {
            margin-bottom: 10px;
        }
        
        .nav-menu a {
            display: block;
            padding: 12px;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        
        .nav-menu a:hover {
            background-color: rgba(255,255,255,0.2);
            transform: translateX(5px);
        }
        
        .nav-menu a.active {
            background-color: rgba(255,255,255,0.3);
            font-weight: bold;
        }
        
        .main-content {
            flex: 1;
            padding: 20px;
        }
        
        .header {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header h1 {
            color: #9C27B0;
            font-size: 1.8em;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #9C27B0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }
        
        .ai-tabs {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }
        
        .tabs {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .tab {
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }
        
        .tab.active {
            background-color: #9C27B0;
            color: white;
        }
        
        .tab:hover {
            background-color: #f0f0f0;
        }
        
        .tab-content {
            display: block;
        }
        
        .config-section {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }
        
        .config-section h3 {
            color: #9C27B0;
            margin-bottom: 20px;
            font-size: 1.3em;
        }
        
        .config-group {
            margin-bottom: 20px;
        }
        
        .config-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #555;
        }
        
        .config-group input,
        .config-group select,
        .config-group textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 1em;
        }
        
        .config-group textarea {
            resize: vertical;
            min-height: 100px;
        }
        
        .config-group .slider {
            width: 100%;
            height: 8px;
            border-radius: 5px;
            background: #e0e0e0;
            outline: none;
            -webkit-appearance: none;
        }
        
        .config-group .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #9C27B0;
            cursor: pointer;
        }
        
        .config-group .slider::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #9C27B0;
            cursor: pointer;
        }
        
        .config-group .value {
            margin-top: 5px;
            font-size: 0.9em;
            color: #666;
        }
        
        .config-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-primary {
            background: #9C27B0;
            color: white;
        }
        
        .btn-primary:hover {
            background: #7B1FA2;
            transform: translateY(-2px);
        }
        
        .btn-secondary {
            background: #e0e0e0;
            color: #333;
        }
        
        .btn-secondary:hover {
            background: #bdbdbd;
            transform: translateY(-2px);
        }
        
        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }
            
            .sidebar {
                width: 100%;
                padding: 10px;
            }
            
            .nav-menu {
                display: flex;
                overflow-x: auto;
                gap: 10px;
            }
            
            .nav-menu li {
                margin-bottom: 0;
            }
            
            .tabs {
                overflow-x: auto;
                flex-wrap: nowrap;
            }
            
            .config-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h2>管理员中心</h2>
            <ul class="nav-menu">
                <li><a href="admin-dashboard.html">仪表盘</a></li>
                <li><a href="admin-user-management.html">用户管理</a></li>
                <li><a href="admin-content-management.html">内容管理</a></li>
                <li><a href="admin-ai-configuration.html" class="active">AI配置</a></li>
                <li><a href="admin-system-settings.html">系统设置</a></li>
                <li><a href="login.html">退出登录</a></li>
            </ul>
        </div>
        
        <div class="main-content">
            <div class="header">
                <h1>AI配置</h1>
                <div class="user-info">
                    <span>欢迎，管理员</span>
                    <div class="user-avatar">管</div>
                </div>
            </div>
            
            <div class="ai-tabs">
                <div class="tabs">
                    <div class="tab active">匹配规则</div>
                    <div class="tab">推荐算法</div>
                    <div class="tab">模型配置</div>
                    <div class="tab">日志分析</div>
                </div>
            </div>
            
            <div class="config-section">
                <h3>匹配规则配置</h3>
                <div class="config-grid">
                    <div class="config-group">
                        <label for="subject-weight">科目匹配权重</label>
                        <input type="range" id="subject-weight" class="slider" min="0" max="100" value="80">
                        <div class="value">当前值: 80%</div>
                    </div>
                    <div class="config-group">
                        <label for="grade-weight">年级匹配权重</label>
                        <input type="range" id="grade-weight" class="slider" min="0" max="100" value="70">
                        <div class="value">当前值: 70%</div>
                    </div>
                    <div class="config-group">
                        <label for="experience-weight">教师经验权重</label>
                        <input type="range" id="experience-weight" class="slider" min="0" max="100" value="60">
                        <div class="value">当前值: 60%</div>
                    </div>
                    <div class="config-group">
                        <label for="rating-weight">教师评分权重</label>
                        <input type="range" id="rating-weight" class="slider" min="0" max="100" value="50">
                        <div class="value">当前值: 50%</div>
                    </div>
                    <div class="config-group">
                        <label for="max-recommendations">最大推荐数量</label>
                        <input type="number" id="max-recommendations" value="5" min="1" max="10">
                    </div>
                    <div class="config-group">
                        <label for="min-match-score">最低匹配分数</label>
                        <input type="number" id="min-match-score" value="60" min="0" max="100">
                    </div>
                    <div class="config-group">
                        <label for="recommendation-interval">推荐更新间隔 (小时)</label>
                        <input type="number" id="recommendation-interval" value="24" min="1" max="168">
                    </div>
                    <div class="config-group">
                        <label for="match-expiry">匹配有效期 (天)</label>
                        <input type="number" id="match-expiry" value="30" min="1" max="90">
                    </div>
                </div>
            </div>
            
            <div class="config-section">
                <h3>推荐算法配置</h3>
                <div class="config-group">
                    <label for="algorithm-type">算法类型</label>
                    <select id="algorithm-type">
                        <option value="collaborative">协同过滤</option>
                        <option value="content-based">基于内容</option>
                        <option value="hybrid" selected>混合推荐</option>
                    </select>
                </div>
                <div class="config-group">
                    <label for="algorithm-params">算法参数</label>
                    <textarea id="algorithm-params" placeholder='{
  "similarity_threshold": 0.7,
  "top_k": 10,
  "alpha": 0.6,
  "beta": 0.4
}'>{
  "similarity_threshold": 0.7,
  "top_k": 10,
  "alpha": 0.6,
  "beta": 0.4
}</textarea>
                </div>
            </div>
            
            <div class="config-section">
                <h3>模型配置</h3>
                <div class="config-group">
                    <label for="model-name">模型名称</label>
                    <input type="text" id="model-name" value="ai-recommender-v1.0">
                </div>
                <div class="config-group">
                    <label for="model-endpoint">模型API端点</label>
                    <input type="text" id="model-endpoint" value="http://localhost:8000/api/v1/recommend">
                </div>
                <div class="config-group">
                    <label for="api-key">API密钥</label>
                    <input type="password" id="api-key" value="your-api-key-here">
                </div>
                <div class="config-group">
                    <label for="timeout">请求超时 (秒)</label>
                    <input type="number" id="timeout" value="30" min="5" max="60">
                </div>
            </div>
            
            <div class="action-buttons">
                <button class="btn btn-primary">保存配置</button>
                <button class="btn btn-secondary">测试配置</button>
                <button class="btn btn-secondary">恢复默认</button>
            </div>
        </div>
    </div>
</body>
</html>
