<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员仪表盘 - 乡村助学平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f0f8ff;
            color: #333;
        }
        
        .container {
            display: flex;
            min-height: 100vh;
        }
        
        .sidebar {
            width: 250px;
            background: linear-gradient(135deg, #9C27B0, #7B1FA2);
            color: white;
            padding: 20px;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
        }
        
        .sidebar h2 {
            margin-bottom: 30px;
            text-align: center;
            font-size: 1.5em;
        }
        
        .nav-menu {
            list-style: none;
        }
        
        .nav-menu li {
            margin-bottom: 10px;
        }
        
        .nav-menu a {
            display: block;
            padding: 12px;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        
        .nav-menu a:hover {
            background-color: rgba(255,255,255,0.2);
            transform: translateX(5px);
        }
        
        .nav-menu a.active {
            background-color: rgba(255,255,255,0.3);
            font-weight: bold;
        }
        
        .main-content {
            flex: 1;
            padding: 20px;
        }
        
        .header {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header h1 {
            color: #9C27B0;
            font-size: 1.8em;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #9C27B0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }
        
        .dashboard-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
        }
        
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }
        
        .card h3 {
            color: #9C27B0;
            margin-bottom: 15px;
            font-size: 1.2em;
        }
        
        .card-icon {
            font-size: 2.5em;
            margin-bottom: 15px;
            color: #9C27B0;
        }
        
        .card-value {
            font-size: 2em;
            font-weight: bold;
            color: #333;
        }
        
        .user-management {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        
        .user-management h3 {
            color: #9C27B0;
            margin-bottom: 20px;
            font-size: 1.3em;
        }
        
        .user-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .user-table th,
        .user-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .user-table th {
            background-color: #f9f9f9;
            font-weight: bold;
            color: #9C27B0;
        }
        
        .user-table tr:hover {
            background-color: #f9f9f9;
        }
        
        .user-role {
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 0.8em;
            font-weight: bold;
        }
        
        .role-teacher {
            background-color: #E3F2FD;
            color: #1976D2;
        }
        
        .role-student {
            background-color: #E8F5E8;
            color: #388E3C;
        }
        
        .role-parent {
            background-color: #FFF3E0;
            color: #F57C00;
        }
        
        .role-admin {
            background-color: #F3E5F5;
            color: #7B1FA2;
        }
        
        .btn {
            padding: 6px 12px;
            border: none;
            border-radius: 5px;
            font-size: 0.8em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-right: 5px;
        }
        
        .btn-primary {
            background: #9C27B0;
            color: white;
        }
        
        .btn-primary:hover {
            background: #7B1FA2;
            transform: translateY(-2px);
        }
        
        .btn-secondary {
            background: #e0e0e0;
            color: #333;
        }
        
        .btn-secondary:hover {
            background: #bdbdbd;
            transform: translateY(-2px);
        }
        
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }
            
            .sidebar {
                width: 100%;
                padding: 10px;
            }
            
            .nav-menu {
                display: flex;
                overflow-x: auto;
                gap: 10px;
            }
            
            .nav-menu li {
                margin-bottom: 0;
            }
            
            .dashboard-cards {
                grid-template-columns: 1fr;
            }
            
            .user-table {
                font-size: 0.9em;
            }
            
            .user-table th,
            .user-table td {
                padding: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h2>管理员中心</h2>
            <ul class="nav-menu">
                <li><a href="admin-dashboard.html" class="active">仪表盘</a></li>
                <li><a href="admin-user-management.html">用户管理</a></li>
                <li><a href="admin-content-management.html">内容管理</a></li>
                <li><a href="admin-ai-configuration.html">AI配置</a></li>
                <li><a href="admin-system-settings.html">系统设置</a></li>
                <li><a href="login.html">退出登录</a></li>
            </ul>
        </div>
        
        <div class="main-content">
            <div class="header">
                <h1>管理员仪表盘</h1>
                <div class="user-info">
                    <span>欢迎，管理员</span>
                    <div class="user-avatar">管</div>
                </div>
            </div>
            
            <div class="dashboard-cards">
                <div class="card">
                    <div class="card-icon">👨‍🏫</div>
                    <h3>教师数量</h3>
                    <div class="card-value">45</div>
                    <p>本周新增 2 名</p>
                </div>
                
                <div class="card">
                    <div class="card-icon">👨‍🎓</div>
                    <h3>学生数量</h3>
                    <div class="card-value">128</div>
                    <p>本周新增 5 名</p>
                </div>
                
                <div class="card">
                    <div class="card-icon">👨‍👩‍👧‍👦</div>
                    <h3>家长数量</h3>
                    <div class="card-value">89</div>
                    <p>本周新增 3 名</p>
                </div>
                
                <div class="card">
                    <div class="card-icon">💬</div>
                    <h3>辅导会话</h3>
                    <div class="card-value">236</div>
                    <p>本周新增 15 次</p>
                </div>
            </div>
            
            <div class="user-management">
                <h3>用户管理</h3>
                <table class="user-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>用户名</th>
                            <th>真实姓名</th>
                            <th>角色</th>
                            <th>状态</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>1</td>
                            <td>teacher1</td>
                            <td>李老师</td>
                            <td><span class="user-role role-teacher">教师</span></td>
                            <td>活跃</td>
                            <td>
                                <button class="btn btn-primary">编辑</button>
                                <button class="btn btn-secondary">禁用</button>
                            </td>
                        </tr>
                        <tr>
                            <td>2</td>
                            <td>student1</td>
                            <td>小明</td>
                            <td><span class="user-role role-student">学生</span></td>
                            <td>活跃</td>
                            <td>
                                <button class="btn btn-primary">编辑</button>
                                <button class="btn btn-secondary">禁用</button>
                            </td>
                        </tr>
                        <tr>
                            <td>3</td>
                            <td>parent1</td>
                            <td>王家长</td>
                            <td><span class="user-role role-parent">家长</span></td>
                            <td>活跃</td>
                            <td>
                                <button class="btn btn-primary">编辑</button>
                                <button class="btn btn-secondary">禁用</button>
                            </td>
                        </tr>
                        <tr>
                            <td>4</td>
                            <td>admin1</td>
                            <td>管理员</td>
                            <td><span class="user-role role-admin">管理员</span></td>
                            <td>活跃</td>
                            <td>
                                <button class="btn btn-primary">编辑</button>
                                <button class="btn btn-secondary">禁用</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
