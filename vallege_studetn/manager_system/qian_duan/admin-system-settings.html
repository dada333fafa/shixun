<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统设置 - 乡村助学平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f0f8ff;
            color: #333;
        }
        
        .container {
            display: flex;
            min-height: 100vh;
        }
        
        .sidebar {
            width: 250px;
            background: linear-gradient(135deg, #9C27B0, #7B1FA2);
            color: white;
            padding: 20px;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
        }
        
        .sidebar h2 {
            margin-bottom: 30px;
            text-align: center;
            font-size: 1.5em;
        }
        
        .nav-menu {
            list-style: none;
        }
        
        .nav-menu li {
            margin-bottom: 10px;
        }
        
        .nav-menu a {
            display: block;
            padding: 12px;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        
        .nav-menu a:hover {
            background-color: rgba(255,255,255,0.2);
            transform: translateX(5px);
        }
        
        .nav-menu a.active {
            background-color: rgba(255,255,255,0.3);
            font-weight: bold;
        }
        
        .main-content {
            flex: 1;
            padding: 20px;
        }
        
        .header {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header h1 {
            color: #9C27B0;
            font-size: 1.8em;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #9C27B0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }
        
        .settings-tabs {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }
        
        .tabs {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .tab {
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }
        
        .tab.active {
            background-color: #9C27B0;
            color: white;
        }
        
        .tab:hover {
            background-color: #f0f0f0;
        }
        
        .tab-content {
            display: block;
        }
        
        .settings-section {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }
        
        .settings-section h3 {
            color: #9C27B0;
            margin-bottom: 20px;
            font-size: 1.3em;
        }
        
        .settings-group {
            margin-bottom: 20px;
        }
        
        .settings-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #555;
        }
        
        .settings-group input,
        .settings-group select,
        .settings-group textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 1em;
        }
        
        .settings-group textarea {
            resize: vertical;
            min-height: 100px;
        }
        
        .settings-group .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .settings-group .checkbox-group input[type="checkbox"] {
            width: auto;
        }
        
        .settings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-primary {
            background: #9C27B0;
            color: white;
        }
        
        .btn-primary:hover {
            background: #7B1FA2;
            transform: translateY(-2px);
        }
        
        .btn-secondary {
            background: #e0e0e0;
            color: #333;
        }
        
        .btn-secondary:hover {
            background: #bdbdbd;
            transform: translateY(-2px);
        }
        
        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .system-info {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 10px;
            border-left: 4px solid #9C27B0;
            margin-bottom: 20px;
        }
        
        .system-info p {
            margin-bottom: 10px;
            font-size: 0.9em;
        }
        
        .system-info .label {
            font-weight: bold;
            color: #555;
        }
        
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }
            
            .sidebar {
                width: 100%;
                padding: 10px;
            }
            
            .nav-menu {
                display: flex;
                overflow-x: auto;
                gap: 10px;
            }
            
            .nav-menu li {
                margin-bottom: 0;
            }
            
            .tabs {
                overflow-x: auto;
                flex-wrap: nowrap;
            }
            
            .settings-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h2>管理员中心</h2>
            <ul class="nav-menu">
                <li><a href="admin-dashboard.html">仪表盘</a></li>
                <li><a href="admin-user-management.html">用户管理</a></li>
                <li><a href="admin-content-management.html">内容管理</a></li>
                <li><a href="admin-ai-configuration.html">AI配置</a></li>
                <li><a href="admin-system-settings.html" class="active">系统设置</a></li>
                <li><a href="login.html">退出登录</a></li>
            </ul>
        </div>
        
        <div class="main-content">
            <div class="header">
                <h1>系统设置</h1>
                <div class="user-info">
                    <span>欢迎，管理员</span>
                    <div class="user-avatar">管</div>
                </div>
            </div>
            
            <div class="settings-tabs">
                <div class="tabs">
                    <div class="tab active">基本设置</div>
                    <div class="tab">邮件配置</div>
                    <div class="tab">短信配置</div>
                    <div class="tab">安全设置</div>
                    <div class="tab">存储设置</div>
                </div>
            </div>
            
            <div class="system-info">
                <h3>系统信息</h3>
                <p><span class="label">系统版本：</span> v1.0.0</p>
                <p><span class="label">最后更新：</span> 2026-03-31 10:00:00</p>
                <p><span class="label">服务器状态：</span> 运行中</p>
                <p><span class="label">数据库状态：</span> 正常</p>
            </div>
            
            <div class="settings-section">
                <h3>基本设置</h3>
                <div class="settings-grid">
                    <div class="settings-group">
                        <label for="site-name">网站名称</label>
                        <input type="text" id="site-name" value="乡村助学平台">
                    </div>
                    <div class="settings-group">
                        <label for="site-description">网站描述</label>
                        <input type="text" id="site-description" value="为乡村孩子提供优质教育资源和心理支持">
                    </div>
                    <div class="settings-group">
                        <label for="site-url">网站URL</label>
                        <input type="text" id="site-url" value="http://localhost:3000">
                    </div>
                    <div class="settings-group">
                        <label for="timezone">时区</label>
                        <select id="timezone">
                            <option value="Asia/Shanghai" selected>Asia/Shanghai (UTC+8)</option>
                            <option value="America/New_York">America/New_York (UTC-5)</option>
                            <option value="Europe/London">Europe/London (UTC+0)</option>
                        </select>
                    </div>
                    <div class="settings-group">
                        <label for="language">默认语言</label>
                        <select id="language">
                            <option value="zh-CN" selected>简体中文</option>
                            <option value="en-US">English</option>
                        </select>
                    </div>
                    <div class="settings-group">
                        <label for="admin-email">管理员邮箱</label>
                        <input type="email" id="admin-email" value="admin@example.com">
                    </div>
                </div>
            </div>
            
            <div class="settings-section">
                <h3>邮件配置</h3>
                <div class="settings-grid">
                    <div class="settings-group">
                        <label for="smtp-host">SMTP服务器</label>
                        <input type="text" id="smtp-host" value="smtp.example.com">
                    </div>
                    <div class="settings-group">
                        <label for="smtp-port">SMTP端口</label>
                        <input type="number" id="smtp-port" value="587">
                    </div>
                    <div class="settings-group">
                        <label for="smtp-username">SMTP用户名</label>
                        <input type="text" id="smtp-username" value="noreply@example.com">
                    </div>
                    <div class="settings-group">
                        <label for="smtp-password">SMTP密码</label>
                        <input type="password" id="smtp-password" value="your-smtp-password">
                    </div>
                    <div class="settings-group">
                        <label for="smtp-secure">使用SSL/TLS</label>
                        <div class="checkbox-group">
                            <input type="checkbox" id="smtp-secure" checked>
                            <span>启用</span>
                        </div>
                    </div>
                    <div class="settings-group">
                        <label for="email-from">发件人邮箱</label>
                        <input type="email" id="email-from" value="noreply@example.com">
                    </div>
                </div>
            </div>
            
            <div class="settings-section">
                <h3>安全设置</h3>
                <div class="settings-grid">
                    <div class="settings-group">
                        <label for="session-timeout">会话超时 (分钟)</label>
                        <input type="number" id="session-timeout" value="30" min="5" max="120">
                    </div>
                    <div class="settings-group">
                        <label for="password-length">最小密码长度</label>
                        <input type="number" id="password-length" value="8" min="6" max="20">
                    </div>
                    <div class="settings-group">
                        <label for="login-attempts">登录尝试次数限制</label>
                        <input type="number" id="login-attempts" value="5" min="1" max="10">
                    </div>
                    <div class="settings-group">
                        <label for="lockout-duration">账户锁定时间 (分钟)</label>
                        <input type="number" id="lockout-duration" value="30" min="5" max="120">
                    </div>
                    <div class="settings-group">
                        <label>启用双因素认证</label>
                        <div class="checkbox-group">
                            <input type="checkbox" id="2fa-enabled">
                            <span>启用</span>
                        </div>
                    </div>
                    <div class="settings-group">
                        <label>启用HTTPS</label>
                        <div class="checkbox-group">
                            <input type="checkbox" id="https-enabled">
                            <span>启用</span>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="action-buttons">
                <button class="btn btn-primary">保存设置</button>
                <button class="btn btn-secondary">测试配置</button>
                <button class="btn btn-secondary">恢复默认</button>
            </div>
        </div>
    </div>
</body>
</html>
