<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学习资源 - 乡村助学平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f0f8ff;
            color: #333;
        }
        
        .container {
            display: flex;
            min-height: 100vh;
        }
        
        .sidebar {
            width: 250px;
            background: linear-gradient(135deg, #4CAF50, #45a049);
            color: white;
            padding: 20px;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
        }
        
        .sidebar h2 {
            margin-bottom: 30px;
            text-align: center;
            font-size: 1.5em;
        }
        
        .nav-menu {
            list-style: none;
        }
        
        .nav-menu li {
            margin-bottom: 10px;
        }
        
        .nav-menu a {
            display: block;
            padding: 12px;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        
        .nav-menu a:hover {
            background-color: rgba(255,255,255,0.2);
            transform: translateX(5px);
        }
        
        .nav-menu a.active {
            background-color: rgba(255,255,255,0.3);
            font-weight: bold;
        }
        
        .main-content {
            flex: 1;
            padding: 20px;
        }
        
        .header {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header h1 {
            color: #4CAF50;
            font-size: 1.8em;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #4CAF50;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }
        
        .search-filter {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        
        .search-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .search-bar input {
            flex: 1;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
        }
        
        .search-bar button {
            padding: 10px 20px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .search-bar button:hover {
            background: #45a049;
            transform: translateY(-2px);
        }
        
        .filters {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .filter-item {
            display: flex;
            flex-direction: column;
        }
        
        .filter-item label {
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }
        
        .filter-item select {
            padding: 8px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
        }
        
        .resources-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        
        .resource-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
        }
        
        .resource-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }
        
        .resource-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }
        
        .resource-icon {
            font-size: 2.5em;
            color: #4CAF50;
        }
        
        .resource-info h3 {
            color: #4CAF50;
            margin-bottom: 5px;
        }
        
        .resource-meta {
            font-size: 0.8em;
            color: #666;
        }
        
        .resource-description {
            margin-bottom: 15px;
            font-size: 0.9em;
            line-height: 1.5;
        }
        
        .resource-tags {
            margin-bottom: 15px;
        }
        
        .tag {
            display: inline-block;
            padding: 3px 8px;
            background: #E8F5E8;
            color: #4CAF50;
            border-radius: 10px;
            font-size: 0.7em;
            margin-right: 5px;
            margin-bottom: 5px;
        }
        
        .btn-download {
            width: 100%;
            padding: 10px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-download:hover {
            background: #45a049;
            transform: translateY(-2px);
        }
        
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }
            
            .sidebar {
                width: 100%;
                padding: 10px;
            }
            
            .nav-menu {
                display: flex;
                overflow-x: auto;
                gap: 10px;
            }
            
            .nav-menu li {
                margin-bottom: 0;
            }
            
            .filters {
                flex-direction: column;
            }
            
            .resources-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h2>学生中心</h2>
            <ul class="nav-menu">
                <li><a href="student-dashboard.html">仪表盘</a></li>
                <li><a href="student-teacher-selection.html">教师选择</a></li>
                <li><a href="student-chat.html">聊天沟通</a></li>
                <li><a href="student-resources.html" class="active">学习资源</a></li>
                <li><a href="student-psychological.html">心理支持</a></li>
                <li><a href="student-ai-recommendation.html">AI推荐</a></li>
                <li><a href="student-match.html">匹配管理</a></li>
                <li><a href="login.html">退出登录</a></li>
            </ul>
        </div>
        
        <div class="main-content">
            <div class="header">
                <h1>学习资源</h1>
                <div class="user-info">
                    <span>欢迎，小明</span>
                    <div class="user-avatar">小</div>
                </div>
            </div>
            
            <div class="search-filter">
                <div class="search-bar">
                    <input type="text" id="searchInput" placeholder="搜索学习资源（标题或描述）">
                    <button id="searchBtn">搜索</button>
                </div>
                <div class="filters">
                    <div class="filter-item">
                        <label>科目</label>
                        <select id="subjectFilter">
                            <option value="">全部科目</option>
                            <option value="math">数学</option>
                            <option value="chinese">语文</option>
                            <option value="english">英语</option>
                            <option value="physics">物理</option>
                            <option value="chemistry">化学</option>
                            <option value="biology">生物</option>
                        </select>
                    </div>
                    <div class="filter-item">
                        <label>资源类型</label>
                        <select id="typeFilter">
                            <option value="">全部类型</option>
                            <option value="courseware">课件</option>
                            <option value="lesson_plan">教案</option>
                            <option value="exercise">练习</option>
                            <option value="video">视频</option>
                            <option value="other">其他</option>
                        </select>
                    </div>
                </div>
            </div>
            
            <div class="resources-grid" id="resourcesGrid">
                <!-- 资源将通过JavaScript动态加载 -->
            </div>
        </div>
    </div>
    
    <script src="api.js"></script>
    <script>
        let currentUser = null;
        let allResources = [];
        let filteredResources = [];
        
        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', async function() {
            try {
                currentUser = await getCurrentUser();
                document.querySelector('.user-info span').textContent = `欢迎，${currentUser.name || currentUser.username}`;
                document.querySelector('.user-avatar').textContent = (currentUser.name || currentUser.username).charAt(0);
                
                // 加载资源列表
                await loadResources();
                
                // 绑定搜索和筛选事件
                bindEventListeners();
            } catch (error) {
                console.error('初始化失败:', error);
                alert('加载页面失败，请重新登录');
                window.location.href = 'login.html';
            }
        });
        
        // 绑定事件监听器
        function bindEventListeners() {
            // 搜索按钮
            document.getElementById('searchBtn').addEventListener('click', filterResources);
            
            // 搜索框回车键
            document.getElementById('searchInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    filterResources();
                }
            });
            
            // 筛选下拉框
            document.getElementById('subjectFilter').addEventListener('change', filterResources);
            document.getElementById('typeFilter').addEventListener('change', filterResources);
        }
        
        // 加载资源列表
        async function loadResources() {
            try {
                const resources = await getResources();
                allResources = resources;
                filteredResources = resources;
                renderResources();
            } catch (error) {
                console.error('加载资源失败:', error);
                alert('加载资源失败: ' + error.message);
            }
        }
        
        // 筛选资源
        function filterResources() {
            const keyword = document.getElementById('searchInput').value.toLowerCase().trim();
            const subjectFilter = document.getElementById('subjectFilter').value;
            const typeFilter = document.getElementById('typeFilter').value;
            
            console.log('筛选条件:', { keyword, subjectFilter, typeFilter });
            
            filteredResources = allResources.filter(resource => {
                // 关键词搜索（标题或描述）
                if (keyword) {
                    const title = (resource.title || '').toLowerCase();
                    const description = (resource.description || '').toLowerCase();
                    if (!title.includes(keyword) && !description.includes(keyword)) {
                        return false;
                    }
                }
                
                // 科目筛选（通过教师科目）
                if (subjectFilter) {
                    const teacher = resource.teacher || {};
                    const subject = (teacher.subject || '').toLowerCase();
                    const subjectMap = {
                        'math': '数学',
                        'chinese': '语文',
                        'english': '英语',
                        'physics': '物理',
                        'chemistry': '化学',
                        'biology': '生物'
                    };
                    const chineseSubject = subjectMap[subjectFilter] || subjectFilter;
                    if (!subject.includes(chineseSubject)) {
                        return false;
                    }
                }
                
                // 资源类型筛选
                if (typeFilter) {
                    if (resource.resourceType !== typeFilter) {
                        return false;
                    }
                }
                
                return true;
            });
            
            console.log('筛选结果:', filteredResources.length, '个资源');
            renderResources();
        }
        
        // 渲染资源列表
        function renderResources() {
            const grid = document.getElementById('resourcesGrid');
            
            if (filteredResources.length === 0) {
                grid.innerHTML = `
                    <div style="grid-column: 1 / -1; text-align: center; padding: 60px 20px; color: #999;">
                        <div style="font-size: 4em; margin-bottom: 20px;">📚</div>
                        <div style="font-size: 1.2em; margin-bottom: 10px;">暂无学习资源</div>
                        <div style="font-size: 0.9em;">请尝试调整搜索条件或筛选器</div>
                    </div>
                `;
                return;
            }
            
            grid.innerHTML = filteredResources.map(resource => {
                const teacher = resource.teacher || {};
                const teacherUser = teacher.user || {};
                const teacherName = teacherUser.name || '教师';
                const subject = teacher.subject || '未知科目';
                
                // 资源类型映射
                const typeMap = {
                    'courseware': { icon: '📊', text: '课件' },
                    'lesson_plan': { icon: '📝', text: '教案' },
                    'exercise': { icon: '✏️', text: '练习' },
                    'video': { icon: '🎥', text: '视频' },
                    'other': { icon: '📄', text: '其他' }
                };
                
                const typeInfo = typeMap[resource.resourceType] || typeMap['other'];
                const uploadDate = formatTime(resource.createdAt);
                
                return `
                    <div class="resource-card">
                        <div class="resource-header">
                            <div class="resource-icon">${typeInfo.icon}</div>
                            <div class="resource-info">
                                <h3>${escapeHtml(resource.title)}</h3>
                                <div class="resource-meta">${escapeHtml(subject)} · ${teacherName} · ${typeInfo.text}</div>
                            </div>
                        </div>
                        <div class="resource-description">
                            ${escapeHtml(resource.description || '暂无描述')}
                        </div>
                        <div class="resource-tags">
                            <span class="tag">${typeInfo.text}</span>
                            <span class="tag">${uploadDate}</span>
                        </div>
                        <button class="btn-download" onclick="handleDownload('${resource._id}')">
                            ${typeInfo.icon} 下载资源
                        </button>
                    </div>
                `;
            }).join('');
        }
        
        // 处理下载
        async function handleDownload(resourceId) {
            try {
                const result = await downloadResource(resourceId);
                const resource = result.resource;
                
                // 显示下载信息
                alert(`\u8d44\u6e90\u51c6\u5907\u5b8c\u6210\uff1a\n\n\u6807\u9898\uff1a${resource.title}\n\u7c7b\u578b\uff1a${resource.resourceType}\n\u6559\u5e08\uff1a${resource.teacherName}\n\n\u8bf7\u6ce8\u610f\uff1a\u7531\u4e8e\u6ca1\u6709\u5b9e\u9645\u6587\u4ef6\uff0c\u8fd9\u91cc\u53ea\u662f\u6a21\u62df\u4e0b\u8f7d\u3002`);
                
                // 如果有实际文件路径，可以创建下载链接
                if (resource.filePath) {
                    // 在实际应用中，这里会创建真实的下载链接
                    console.log('文件路径:', resource.filePath);
                }
                
            } catch (error) {
                console.error('下载失败:', error);
                alert('下载失败: ' + error.message);
            }
        }
        
        // 格式化时间
        function formatTime(dateString) {
            if (!dateString) return '';
            const date = new Date(dateString);
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }
        
        // HTML转义，防止XSS攻击
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
